<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7"/>
      <stop offset="100%" style="stop-color:#4A3DB5"/>
    </linearGradient>
    <linearGradient id="toothGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00CEC9"/>
      <stop offset="100%" style="stop-color:#00B894"/>
    </linearGradient>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FD79A8"/>
      <stop offset="100%" style="stop-color:#E84393"/>
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)"/>
  
  <!-- Teeth Arch - 6 teeth in U-shape -->
  <!-- Left teeth -->
  <rect x="108" y="140" width="52" height="90" rx="26" ry="40" fill="white" opacity="0.95"/>
  <rect x="172" y="120" width="52" height="110" rx="26" ry="45" fill="white" opacity="0.95"/>
  
  <!-- Center teeth (taller) -->
  <rect x="218" y="100" width="56" height="130" rx="28" ry="50" fill="white" opacity="0.95"/>
  <rect x="238" y="100" width="56" height="130" rx="28" ry="50" fill="white" opacity="0.95"/>
  
  <!-- Right teeth -->
  <rect x="288" y="120" width="52" height="110" rx="26" ry="45" fill="white" opacity="0.95"/>
  <rect x="352" y="140" width="52" height="90" rx="26" ry="40" fill="white" opacity="0.95"/>
  
  <!-- Smile arc under teeth -->
  <path d="M 130 260 Q 256 360 382 260" stroke="white" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.3"/>
  
  <!-- Heart in center -->
  <g transform="translate(256, 310) scale(1.2)">
    <path d="M 0 20 
             C 0 20, -35 -10, -35 -25 
             C -35 -45, -15 -50, 0 -30 
             C 15 -50, 35 -45, 35 -25 
             C 35 -10, 0 20, 0 20 Z" 
          fill="url(#heartGrad)" opacity="0.9"/>
  </g>
  
  <!-- Sparkle dots -->
  <circle cx="130" cy="320" r="6" fill="white" opacity="0.4"/>
  <circle cx="382" cy="320" r="6" fill="white" opacity="0.4"/>
  <circle cx="170" cy="360" r="4" fill="white" opacity="0.3"/>
  <circle cx="342" cy="360" r="4" fill="white" opacity="0.3"/>
</svg>