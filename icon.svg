<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7"/>
      <stop offset="100%" style="stop-color:#4A3DB5"/>
    </linearGradient>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FD79A8"/>
      <stop offset="100%" style="stop-color:#E84393"/>
    </linearGradient>
  </defs>
  
  <!-- Background Circle - fills entire square -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>
  
  <!-- Teeth Arch - 6 teeth in U-shape -->
  <rect x="108" y="130" width="52" height="100" rx="26" ry="42" fill="white" opacity="0.95"/>
  <rect x="172" y="110" width="52" height="120" rx="26" ry="46" fill="white" opacity="0.95"/>
  <rect x="217" y="90" width="58" height="140" rx="29" ry="52" fill="white" opacity="0.95"/>
  <rect x="237" y="90" width="58" height="140" rx="29" ry="52" fill="white" opacity="0.95"/>
  <rect x="288" y="110" width="52" height="120" rx="26" ry="46" fill="white" opacity="0.95"/>
  <rect x="352" y="130" width="52" height="100" rx="26" ry="42" fill="white" opacity="0.95"/>
  
  <!-- Smile arc under teeth -->
  <path d="M 120 255 Q 256 370 392 255" stroke="white" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.25"/>
  
  <!-- Heart in center -->
  <g transform="translate(256, 315) scale(1.4)">
    <path d="M 0 20 C 0 20, -35 -10, -35 -25 C -35 -45, -15 -50, 0 -30 C 15 -50, 35 -45, 35 -25 C 35 -10, 0 20, 0 20 Z" 
          fill="url(#heartGrad)" opacity="0.9"/>
  </g>
  
  <!-- Sparkle dots -->
  <circle cx="120" cy="330" r="6" fill="white" opacity="0.35"/>
  <circle cx="392" cy="330" r="6" fill="white" opacity="0.35"/>
  <circle cx="160" cy="375" r="4" fill="white" opacity="0.25"/>
  <circle cx="352" cy="375" r="4" fill="white" opacity="0.25"/>
</svg>